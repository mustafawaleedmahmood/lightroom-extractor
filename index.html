<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightroom XMP Extractor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #172033;
      padding: 20px;
    }
    .container {
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1.1fr);
      gap: 18px;
      align-items: start;
    }
    @media (max-width: 980px) {
      .container { grid-template-columns: 1fr; }
    }
    .panel {
      background: #fff;
      border: 1px solid #dfe5f2;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(23, 32, 51, 0.08);
      overflow: hidden;
    }
    .panel-body { padding: 20px; }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
    }
    .muted {
      color: #607086;
      line-height: 1.7;
      margin: 0 0 16px;
    }
    .upload {
      display: block;
      border: 2px dashed #3b82f6;
      border-radius: 8px;
      padding: 28px 18px;
      text-align: center;
      background: #f8fbff;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .upload.dragover {
      background: #eef6ff;
      border-color: #1d4ed8;
    }
    .upload strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }
    .upload span { color: #607086; }
    input[type=file] { display: none; }
    .files {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
    }
    .file {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid #e5eaf3;
      border-radius: 8px;
      background: #fbfcff;
      direction: ltr;
      text-align: left;
    }
    button {
      border: 0;
      border-radius: 8px;
      min-height: 44px;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .primary { background: #2563eb; color: #fff; }
    .secondary { background: #edf2f7; color: #172033; }
    .danger { background: #ef4444; color: #fff; min-height: 36px; }
    .success { background: #059669; color: #fff; width: 100%; margin-top: 12px; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .message {
      display: none;
      margin: 0 0 14px;
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.7;
      border: 1px solid transparent;
    }
    .message.show { display: block; }
    .message.info { background: #eff6ff; border-color: #bfdbfe; color: #1e3a8a; }
    .message.ok { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
    .message.warn { background: #fffbeb; border-color: #fde68a; color: #92400e; }
    .message.err { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0 0;
    }
    .summary div {
      padding: 12px;
      border: 1px solid #e5eaf3;
      border-radius: 8px;
      background: #fbfcff;
      text-align: center;
    }
    .summary strong {
      display: block;
      font-size: 20px;
      color: #2563eb;
      direction: ltr;
    }
    .empty {
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      color: #607086;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      padding: 18px;
    }
    .section {
      border: 1px solid #e5eaf3;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .section h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e5eaf3;
      color: #1d4ed8;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
    }
    @media (max-width: 620px) {
      .grid, .actions, .summary { grid-template-columns: 1fr; }
    }
    .field {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid #eef2f7;
      background: #fbfcff;
      border-radius: 8px;
      padding: 9px 10px;
    }
    .field span:last-child {
      direction: ltr;
      font-weight: 700;
      color: #172033;
    }
    pre {
      direction: ltr;
      text-align: left;
      white-space: pre-wrap;
      max-height: 300px;
      overflow: auto;
      padding: 14px;
      border-radius: 8px;
      background: #0f172a;
      color: #e5e7eb;
      font-size: 12px;
    }
    .warnings {
      margin-top: 12px;
      padding: 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      color: #92400e;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel">
      <div class="panel-body">
        <h1>مستخرج Lightroom XMP</h1>
        <p class="muted">ارفع صور إعدادات Lightroom Mobile. السيرفر يستخرج القيم، يطبعها في XMP متوافق مع Adobe Camera Raw، ثم يتحقق أن كل قيمة وصلت إلى الملف النهائي.</p>

        <div id="message" class="message info show">اختر صور الإعدادات ثم اضغط معالجة الصور.</div>

        <label id="upload" class="upload" for="fileInput">
          <strong>اسحب الصور هنا أو اضغط للاختيار</strong>
          <span>JPG / PNG / WEBP / TIFF حتى 25 صورة</span>
          <input id="fileInput" type="file" multiple accept="image/jpeg,image/png,image/webp,image/tiff" />
        </label>

        <div id="files" class="files"></div>

        <div class="summary">
          <div><strong id="fileCount">0</strong>ملفات</div>
          <div><strong id="totalSize">0 MB</strong>الحجم</div>
          <div><strong id="detectedCount">0</strong>حقول مكتشفة</div>
        </div>

        <div class="actions">
          <button id="processBtn" class="primary" type="button" disabled>معالجة الصور</button>
          <button id="clearBtn" class="secondary" type="button">مسح</button>
        </div>
        <button id="downloadBtn" class="success" type="button" disabled style="display:none;">تحميل ملف XMP</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-body">
        <div id="results" class="empty">لا توجد نتائج بعد.</div>
        <div id="warnings" class="warnings" style="display:none;"></div>
        <pre id="xmpPreview" style="display:none;"></pre>
      </div>
    </section>
  </main>

  <script>
    "use strict";

    const MAX_FILES = 25;
    const API_URL = "/api/process";
    const upload = document.getElementById("upload");
    const fileInput = document.getElementById("fileInput");
    const filesBox = document.getElementById("files");
    const message = document.getElementById("message");
    const fileCount = document.getElementById("fileCount");
    const totalSize = document.getElementById("totalSize");
    const detectedCount = document.getElementById("detectedCount");
    const processBtn = document.getElementById("processBtn");
    const clearBtn = document.getElementById("clearBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const results = document.getElementById("results");
    const warningsBox = document.getElementById("warnings");
    const xmpPreview = document.getElementById("xmpPreview");

    let selectedFiles = [];
    let currentXmp = "";

    function showMessage(text, type = "info") {
      message.className = `message ${type} show`;
      message.textContent = text;
    }

    function formatBytes(bytes) {
      if (!bytes) return "0 MB";
      return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
    }

    function updateState() {
      filesBox.innerHTML = "";
      selectedFiles.forEach((file, index) => {
        const row = document.createElement("div");
        row.className = "file";
        row.innerHTML = `<span>${file.name} - ${formatBytes(file.size)}</span>`;
        const remove = document.createElement("button");
        remove.className = "danger";
        remove.type = "button";
        remove.textContent = "حذف";
        remove.addEventListener("click", () => {
          selectedFiles.splice(index, 1);
          updateState();
        });
        row.appendChild(remove);
        filesBox.appendChild(row);
      });

      fileCount.textContent = selectedFiles.length;
      totalSize.textContent = formatBytes(selectedFiles.reduce((sum, file) => sum + file.size, 0));
      processBtn.disabled = selectedFiles.length === 0;
    }

    function addFiles(fileList) {
      const incoming = Array.from(fileList);
      for (const file of incoming) {
        if (!file.type.startsWith("image/")) {
          showMessage(`تم تجاهل ${file.name}: الملف ليس صورة مدعومة.`, "warn");
          continue;
        }
        const duplicate = selectedFiles.some(item => item.name === file.name && item.size === file.size);
        if (!duplicate && selectedFiles.length < MAX_FILES) {
          selectedFiles.push(file);
        }
      }
      updateState();
    }

    upload.addEventListener("dragover", (event) => {
      event.preventDefault();
      upload.classList.add("dragover");
    });

    upload.addEventListener("dragleave", () => upload.classList.remove("dragover"));

    upload.addEventListener("drop", (event) => {
      event.preventDefault();
      upload.classList.remove("dragover");
      addFiles(event.dataTransfer.files);
    });

    fileInput.addEventListener("change", (event) => {
      addFiles(event.target.files);
      fileInput.value = "";
    });

    clearBtn.addEventListener("click", () => {
      selectedFiles = [];
      currentXmp = "";
      detectedCount.textContent = "0";
      downloadBtn.disabled = true;
      downloadBtn.style.display = "none";
      xmpPreview.style.display = "none";
      warningsBox.style.display = "none";
      results.className = "empty";
      results.textContent = "لا توجد نتائج بعد.";
      updateState();
      showMessage("تم المسح.", "info");
    });

    function renderSection(name, values) {
      const section = document.createElement("section");
      section.className = "section";
      const title = document.createElement("h2");
      title.textContent = name;
      const grid = document.createElement("div");
      grid.className = "grid";

      for (const [key, value] of Object.entries(values || {})) {
        const field = document.createElement("div");
        field.className = "field";
        const label = document.createElement("span");
        label.textContent = key;
        const val = document.createElement("span");
        val.textContent = Array.isArray(value) ? value.join(" | ") : value;
        field.append(label, val);
        grid.appendChild(field);
      }

      section.append(title, grid);
      return section;
    }

    function renderResults(payload) {
      results.className = "";
      results.innerHTML = "";
      const settings = payload.settings || {};
      ["Light", "Effects", "HSL", "Curves"].forEach(name => {
        if (settings[name]) results.appendChild(renderSection(name, settings[name]));
      });

      detectedCount.textContent = (payload.detected_fields || []).length;
      const warnings = payload.warnings || [];
      warningsBox.style.display = warnings.length ? "block" : "none";
      warningsBox.innerHTML = warnings.length ? warnings.map(item => `<div>${item}</div>`).join("") : "";

      currentXmp = payload.xmp || "";
      xmpPreview.textContent = currentXmp;
      xmpPreview.style.display = currentXmp ? "block" : "none";
      downloadBtn.disabled = !currentXmp;
      downloadBtn.style.display = currentXmp ? "block" : "none";
    }

    processBtn.addEventListener("click", async () => {
      if (!selectedFiles.length) return;

      const form = new FormData();
      selectedFiles.forEach(file => form.append("images", file, file.name));

      processBtn.disabled = true;
      showMessage("جاري التحليل وبناء ملف XMP...", "info");

      try {
        const response = await fetch(API_URL, { method: "POST", body: form });
        const payload = await response.json();
        if (!response.ok || !payload.success) {
          throw new Error(payload.error || "فشل إنشاء XMP.");
        }
        renderResults(payload);
        showMessage("تم إنشاء ملف XMP والتحقق منه بنجاح.", "ok");
      } catch (error) {
        showMessage(error.message, "err");
      } finally {
        processBtn.disabled = selectedFiles.length === 0;
      }
    });

    downloadBtn.addEventListener("click", () => {
      if (!currentXmp) return;
      const blob = new Blob([currentXmp], { type: "application/rdf+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "Lightroom_Preset.xmp";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
