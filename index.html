<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستخرج Lightroom XMP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:20px;
    color:#222;
}

.container{
    max-width:1400px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    margin-bottom:20px;
    font-size:32px;
}

.upload-area{
    border:3px dashed #6c63ff;
    border-radius:20px;
    padding:60px 20px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
    background:#fafaff;
}

.upload-area:hover{
    background:#f0efff;
}

.upload-area.drag{
    background:#e8e5ff;
}

.upload-area h2{
    margin-top:15px;
}

input[type=file]{
    display:none;
}

.file-list{
    margin-top:20px;
    max-height:500px;
    overflow:auto;
}

.file-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    margin-bottom:10px;
    background:#f8f8f8;
    border-radius:12px;
    border-right:5px solid #6c63ff;
}

.file-name{
    font-size:14px;
    word-break:break-all;
}

.remove-btn{
    background:#ff4d4d;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
}

.stat-box{
    background:linear-gradient(135deg,#6c63ff,#8a63ff);
    color:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
}

button{
    border:none;
    padding:16px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.process-btn{
    background:#6c63ff;
    color:white;
}

.clear-btn{
    background:white;
    border:2px solid #6c63ff;
}

.download-btn{
    width:100%;
    margin-top:20px;
    background:#10b981;
    color:white;
}

.result-section{
    margin-bottom:30px;
}

.result-section h3{
    margin-bottom:15px;
    color:#6c63ff;
    border-bottom:2px solid #eee;
    padding-bottom:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.field{
    background:#f8f8f8;
    border-radius:10px;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.field span:first-child{
    color:#555;
}

.field span:last-child{
    font-weight:bold;
    color:#6c63ff;
}

.loading{
    display:none;
    margin-top:20px;
    text-align:center;
}

.loading.active{
    display:block;
}

@media(max-width:1000px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>📸 مستخرج Lightroom XMP</h1>

        <label class="upload-area" id="uploadArea">
            <div>
                <div style="font-size:60px;">📁</div>
                <h2>اسحب الصور هنا</h2>
                <p>أو انقر لاختيار الصور (حتى 25 صورة)</p>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*">
        </label>

        <div class="file-list" id="fileList"></div>

        <div class="stats">
            <div class="stat-box">
                <h2 id="imageCount">0</h2>
                <p>عدد الصور</p>
            </div>

            <div class="stat-box">
                <h2 id="totalSize">0 MB</h2>
                <p>الحجم الكلي</p>
            </div>
        </div>

        <div class="actions">
            <button class="clear-btn" id="clearBtn">
                🗑️ مسح
            </button>

            <button class="process-btn" id="processBtn">
                ⚡ معالجة الصور
            </button>
        </div>

        <button class="download-btn" id="downloadBtn" disabled>
            💾 تحميل ملف XMP
        </button>

        <div class="loading" id="loading">
            جاري تحليل الصور...
        </div>

    </div>

    <div class="card">

        <h1>📊 البيانات المستخرجة</h1>

        <div id="results"></div>

    </div>

</div>

<script>

const API_URL = "/api/process";

let uploadedFiles = [];
let extractedData = null;
let xmpBlob = null;

const fileInput = document.getElementById("fileInput");
const uploadArea = document.getElementById("uploadArea");
const fileList = document.getElementById("fileList");
const imageCount = document.getElementById("imageCount");
const totalSize = document.getElementById("totalSize");
const processBtn = document.getElementById("processBtn");
const clearBtn = document.getElementById("clearBtn");
const results = document.getElementById("results");
const loading = document.getElementById("loading");
const downloadBtn = document.getElementById("downloadBtn");

uploadArea.addEventListener("click",()=>{
    fileInput.click();
});

fileInput.addEventListener("change",(e)=>{
    addFiles(e.target.files);
});

uploadArea.addEventListener("dragover",(e)=>{
    e.preventDefault();
    uploadArea.classList.add("drag");
});

uploadArea.addEventListener("dragleave",()=>{
    uploadArea.classList.remove("drag");
});

uploadArea.addEventListener("drop",(e)=>{
    e.preventDefault();
    uploadArea.classList.remove("drag");
    addFiles(e.dataTransfer.files);
});

function addFiles(files){

    for(let file of files){

        if(uploadedFiles.length >= 25){
            alert("الحد الأقصى 25 صورة");
            break;
        }

        uploadedFiles.push(file);
    }

    renderFiles();
}

function renderFiles(){

    fileList.innerHTML = "";

    uploadedFiles.forEach((file,index)=>{

        const item = document.createElement("div");
        item.className = "file-item";

        item.innerHTML = `
            <div>
                <div class="file-name">${file.name}</div>
                <small>${(file.size / 1024).toFixed(1)} KB</small>
            </div>

            <button class="remove-btn" onclick="removeFile(${index})">
                حذف
            </button>
        `;

        fileList.appendChild(item);
    });

    imageCount.innerText = uploadedFiles.length;

    const total = uploadedFiles.reduce((a,b)=>a+b.size,0);

    totalSize.innerText = (total / (1024*1024)).toFixed(2) + " MB";
}

function removeFile(index){

    uploadedFiles.splice(index,1);

    renderFiles();
}

clearBtn.addEventListener("click",()=>{

    uploadedFiles = [];
    extractedData = null;
    xmpBlob = null;

    fileList.innerHTML = "";
    results.innerHTML = "";

    imageCount.innerText = 0;
    totalSize.innerText = "0 MB";

    downloadBtn.disabled = true;
});

processBtn.addEventListener("click", async ()=>{

    if(uploadedFiles.length === 0){
        alert("قم برفع الصور أولاً");
        return;
    }

    loading.classList.add("active");

    try{

        const formData = new FormData();

        uploadedFiles.forEach(file=>{
            formData.append("images",file);
        });

        const response = await fetch(API_URL,{
            method:"POST",
            body:formData
        });

        if(!response.ok){
            throw new Error("فشل السيرفر");
        }

        const data = await response.json();

        extractedData = data.settings;

        xmpBlob = new Blob(
            [data.xmp],
            {type:"application/rdf+xml"}
        );

        renderResults(extractedData);

        downloadBtn.disabled = false;

    }catch(error){

        console.error(error);

        alert("حدث خطأ أثناء التحليل");

    }finally{

        loading.classList.remove("active");
    }

});

downloadBtn.addEventListener("click",()=>{

    if(!xmpBlob) return;

    const url = URL.createObjectURL(xmpBlob);

    const a = document.createElement("a");

    a.href = url;
    a.download = "preset.xmp";

    document.body.appendChild(a);

    a.click();

    a.remove();

    URL.revokeObjectURL(url);
});

function renderResults(data){

    results.innerHTML = "";

    for(const section in data){

        const block = document.createElement("div");

        block.className = "result-section";

        let html = `
            <h3>${section}</h3>
            <div class="grid">
        `;

        for(const key in data[section]){

            html += `
                <div class="field">
                    <span>${key}</span>
                    <span>${data[section][key]}</span>
                </div>
            `;
        }

        html += `
            </div>
        `;

        block.innerHTML = html;

        results.appendChild(block);
    }
}

</script>

</body>
</html>
